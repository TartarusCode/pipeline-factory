name: Trivy Scan
description: Scan filesystem and optionally a container image
inputs:
  image-ref:
    required: false
    description: Image reference to scan (e.g. 123456789012.dkr.ecr.us-east-1.amazonaws.com/app:tag)
  scan-source:
    required: false
    default: 'true'
    description: Run a filesystem scan of the checked-out source tree
  severity:
    required: false
    default: CRITICAL,HIGH
  exit-code:
    required: false
    default: '1'
runs:
  using: composite
  steps:
    - name: Trivy FS scan (source)
      if: ${{ inputs.scan-source == 'true' }}
      uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
      with:
        scan-type: fs
        format: table
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit-code }}

    - name: Trivy Image scan
      if: ${{ inputs.image-ref != '' }}
      uses: aquasecurity/trivy-action@6e7b7d1fd3e4fef0c5fa8cce1229c54b2c9bd0d8
      with:
        image-ref: ${{ inputs.image-ref }}
        format: table
        severity: ${{ inputs.severity }}
        exit-code: ${{ inputs.exit-code }}
